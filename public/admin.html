<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | eCatarman</title>
  <meta name="description" content="eCatarman Admin Dashboard — Internal LGU Management System">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body {
      background: linear-gradient(135deg, var(--slate-900) 0%, #0c1222 50%, var(--teal-900) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .admin-login {
      width: 100%;
      max-width: 28rem;
      padding: 1.5rem;
    }
    .admin-login__logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .admin-login__logo-text {
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.025em;
    }
    .admin-login__logo-text span { color: var(--teal-400); }
    .admin-login__logo-sub {
      color: var(--slate-400);
      font-size: 0.875rem;
      font-weight: 600;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .admin-login__logo-badge {
      background: rgba(20, 184, 166, 0.15);
      border: 1px solid rgba(20, 184, 166, 0.3);
      color: var(--teal-400);
      font-size: 0.625rem;
      font-weight: 900;
      padding: 0.25rem 0.625rem;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    .admin-login__card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2rem;
      padding: 2.5rem;
      backdrop-filter: blur(24px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .admin-login__title {
      font-size: 1.5rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .admin-login__desc {
      color: var(--slate-400);
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .admin-login .form-label {
      color: var(--slate-300);
    }
    .admin-login .form-input {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
    .admin-login .form-input::placeholder {
      color: var(--slate-500);
    }
    .admin-login .form-input:focus {
      border-color: var(--teal-400);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.15);
    }
    .admin-login .form-submit {
      margin-top: 0.5rem;
    }
    .admin-login__error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--red-400);
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: none;
    }
    .admin-login__error.visible { display: block; }
    .admin-login__hint {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--slate-500);
      font-size: 0.8125rem;
      font-weight: 500;
    }
    .admin-login__hint code {
      background: rgba(255,255,255,0.1);
      padding: 0.125rem 0.5rem;
      border-radius: 0.375rem;
      color: var(--teal-300);
      font-weight: 700;
    }
    .admin-login__back {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: var(--slate-400);
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
    }
    .admin-login__back:hover { color: var(--teal-400); }
  </style>
</head>
<body>

  <div class="admin-login">
    <div class="admin-login__logo">
      <div class="admin-login__logo-text">e<span>Catarman</span></div>
      <div class="admin-login__logo-sub">
        <span class="admin-login__logo-badge">Admin</span>
        Internal Governance System
      </div>
    </div>

    <div class="admin-login__card">
      <h1 class="admin-login__title">Sign In</h1>
      <p class="admin-login__desc">Access the department management dashboard to process requests, route workflows, and monitor analytics.</p>

      <div class="admin-login__error" id="login-error">Invalid credentials. Please try again.</div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" name="username" value="admin" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" value="admin" placeholder="Enter password" required>
        </div>
        <button type="submit" class="form-submit">Sign In to Dashboard</button>
      </form>

      <p class="admin-login__hint">
        Demo: <code>admin</code> / <code>admin</code>
      </p>
    </div>

    <a href="/" class="admin-login__back">← Back to Citizen Portal</a>
  </div>

  <script src="/js/icons.js"></script>
  <script src="/js/data.js"></script>
  <script>
    // If already logged in, redirect to dashboard
    if (eCatarman.isLoggedIn()) {
      window.location.href = "/dashboard";
    }

    document.getElementById("login-form").addEventListener("submit", function (e) {
      e.preventDefault();
      var username = document.getElementById("username").value;
      var password = document.getElementById("password").value;

      if (eCatarman.login(username, password)) {
        window.location.href = "/dashboard";
      } else {
        document.getElementById("login-error").classList.add("visible");
      }
    });
  </script>

</body>
</html>
